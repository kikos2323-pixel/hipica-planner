<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pixel Runner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: monospace; touch-action: none; }

    /* ── LOBBY ─────────────────────────────────────── */
    #lobby {
      position: fixed; inset: 0; z-index: 50;
      background: linear-gradient(160deg, #f0f4f0 0%, #e8f0e8 50%, #f4f0e8 100%);
      display: flex; flex-direction: column; align-items: center;
      overflow-y: auto; padding: 24px 16px 32px;
      gap: 20px;
    }
    #lobby.hidden { display: none; }

    .lobby-header { text-align: center; }
    .lobby-header .eyebrow { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin-bottom: 4px; }
    .lobby-header h1 { font-size: clamp(2rem, 8vw, 3rem); font-family: monospace; font-weight: 900; color: #222; letter-spacing: -1px; }

    .lobby-score { display: flex; gap: 12px; }
    .score-pill { padding: 10px 20px; border-radius: 16px; background: #fff; border: 2px solid #e0e0e0; text-align: center; min-width: 100px; }
    .score-pill span { display: block; font-size: 0.7rem; color: #888; font-weight: 700; margin-bottom: 2px; }
    .score-pill strong { font-size: 1.4rem; color: #222; }

    .lobby-section { width: 100%; max-width: 520px; }
    .lobby-section h2 { font-size: 0.78rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 10px; }

    .character-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
    .char-btn { height: 70px; border: 2px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s, transform .15s; }
    .char-btn.active { border-color: #222; background: #fff3c4; transform: scale(1.05); }
    .char-btn svg { width: 76px; height: 58px; overflow: visible; image-rendering: pixelated; }

    .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .diff-btn { padding: 14px 8px; border: 2px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; text-align: center; font-family: monospace; font-weight: 900; font-size: 0.9rem; color: #444; transition: border-color .15s, background .15s, transform .15s; }
    .diff-btn.active { border-color: #222; background: #fff3c4; transform: scale(1.02); }
    .diff-btn .diff-label { display: block; font-size: 0.68rem; color: #888; margin-top: 4px; font-weight: 700; }

    .play-btn {
      width: 100%; max-width: 520px; height: 62px;
      border: 0; border-radius: 16px;
      background: #222; color: #fff;
      font-family: monospace; font-size: 1.3rem; font-weight: 900;
      cursor: pointer; letter-spacing: 1px;
      transition: transform .15s, background .15s;
    }
    .play-btn:hover { background: #000; transform: scale(1.02); }

    /* ── GAME ─────────────────────────────────────── */
    #gameWrap {
      position: fixed; inset: 0; z-index: 40;
      display: flex; flex-direction: column;
      background: #f3f3f3;
    }
    #gameWrap.hidden { display: none; }

    #game {
      position: relative; flex: 1; overflow: hidden;
      background: #fff; user-select: none; image-rendering: pixelated;
    }
    .hud { position: absolute; top: 12px; right: 14px; display: flex; gap: 16px; color: #555; font-size: clamp(13px, 3.5vw, 18px); font-weight: 900; letter-spacing: 1px; z-index: 20; }
    .ground { position: absolute; left: 0; right: 0; bottom: var(--ground-bottom); height: 3px; background: repeating-linear-gradient(to right, #555 0, #555 18px, transparent 18px, transparent 32px); z-index: 2; }
    .cloud { position: absolute; top: 52px; right: -90px; width: 56px; height: 18px; opacity: .45; z-index: 1; }
    .cloud::before, .cloud::after, .cloud span { content: ""; position: absolute; bottom: 0; border-top: 3px solid #999; border-radius: 50%; }
    .cloud::before { left: 0; width: 22px; height: 12px; }
    .cloud span { left: 17px; width: 28px; height: 18px; }
    .cloud::after { left: 38px; width: 22px; height: 12px; }
    .horse { position: absolute; left: clamp(28px, 11vw, 72px); bottom: calc(var(--ground-bottom) + 3px); width: 84px; height: 72px; z-index: 10; transform-origin: bottom left; }
    .horse.duck { height: 48px; }
    .horse.duck .pixel-horse { transform: translateY(20px) scaleY(.72); transform-origin: bottom left; }
    .pixel-horse { position: absolute; left: 0; bottom: 0; width: 84px; height: 72px; }
    .horse-runner-svg { position: absolute; left: -6px; bottom: 2px; width: 96px; height: 72px; overflow: visible; image-rendering: pixelated; }
    .px { position: absolute; width: 6px; height: 6px; background: #555; }
    .mane, .hoof, .eye { background: #333; }
    .tail-anim-a, .tail-anim-b, .leg-a, .leg-b { animation-duration: 260ms; animation-iteration-count: infinite; animation-timing-function: steps(1, end); }
    .tail-anim-a { animation-name: tailA; } .tail-anim-b { animation-name: tailB; } .leg-a { animation-name: legA; } .leg-b { animation-name: legB; }
    @keyframes legA { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes legB { 0%,100% { transform: translateY(-6px); } 50% { transform: translateY(0); } }
    @keyframes tailA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-6px,6px); } }
    @keyframes tailB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-6px,-6px); } }
    .obstacle, .low-obstacle { position: absolute; z-index: 8; image-rendering: pixelated; }
    .fence { bottom: calc(var(--ground-bottom) + 3px); height: 66px; }
    .fence.small { width: 48px; } .fence.medium { width: 68px; } .fence.long { width: 96px; }
    .fence .post, .fence .bar, .low-obstacle .rail, .low-obstacle .cap { position: absolute; background: #555; }
    .fence .post { bottom: 0; width: 7px; height: 62px; }
    .fence .post.left { left: 4px; } .fence .post.right { right: 4px; }
    .fence .bar { left: 0; height: 7px; width: 100%; }
    .fence .bar.one { bottom: 12px; } .fence .bar.two { bottom: 28px; } .fence .bar.three { bottom: 44px; }
    .low-obstacle { width: 86px; height: 52px; bottom: calc(var(--ground-bottom) + 64px); }
    .low-obstacle .rail { left: 0; top: 0; width: 86px; height: 8px; }
    .low-obstacle .cap { width: 9px; height: 20px; top: 0; }
    .low-obstacle .cap.left { left: 0; } .low-obstacle .cap.right { right: 0; }
    .msg { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: rgba(255,255,255,.82); color: #333; text-align: center; z-index: 40; padding: 24px; }
    .msg.hidden { display: none; }
    .msg h1 { font-size: clamp(22px, 7vw, 38px); letter-spacing: 1px; }
    .msg p { max-width: 360px; color: #666; font-size: clamp(13px, 3.5vw, 15px); line-height: 1.4; }
    .msg-btn { border: 0; border-radius: 999px; padding: 12px 24px; background: #333; color: #fff; font-weight: 900; font-family: monospace; cursor: pointer; font-size: 1rem; }
    .msg-btn.secondary { background: transparent; border: 2px solid #ccc; color: #555; margin-top: 4px; }

    .controls-bar { display: flex; gap: 10px; padding: 10px 10px env(safe-area-inset-bottom, 10px); background: #f3f3f3; flex-shrink: 0; }
    .control-btn { flex: 1; height: 58px; border: 3px solid #222; border-radius: 12px; background: #fff; color: #333; font-family: monospace; font-size: 18px; font-weight: 900; touch-action: none; }
    .lobby-back-btn { flex: 0 0 58px; height: 58px; border: 3px solid #ccc; border-radius: 12px; background: #fff; color: #888; font-family: monospace; font-size: 1.1rem; font-weight: 900; touch-action: none; }
  </style>
</head>
<body>

  <!-- LOBBY -->
  <div id="lobby">
    <div class="lobby-header">
      <div class="eyebrow">Hípica App</div>
      <h1>🐴 Pixel Runner</h1>
    </div>

    <div class="lobby-score">
      <div class="score-pill"><span>RÉCORD</span><strong id="lobbyBest">00000</strong></div>
    </div>

    <div class="lobby-section">
      <h2>Elige tu caballo</h2>
      <div class="character-grid" id="lobbyCharGrid"></div>
    </div>

    <div class="lobby-section">
      <h2>Dificultad</h2>
      <div class="diff-grid">
        <button class="diff-btn active" data-diff="easy">🐢 Fácil<span class="diff-label">Más lento</span></button>
        <button class="diff-btn" data-diff="normal">🐎 Normal<span class="diff-label">Equilibrado</span></button>
        <button class="diff-btn" data-diff="hard">🔥 Difícil<span class="diff-label">Veloz</span></button>
      </div>
    </div>

    <button class="play-btn" id="lobbyPlayBtn">¡ JUGAR !</button>
  </div>

  <!-- GAME -->
  <div id="gameWrap" class="hidden">
    <div class="game" id="game" style="--ground-bottom: 54px;">
      <div class="hud"><span>HI <span id="best">00000</span></span><span id="score">00000</span></div>
      <div class="cloud" id="cloud"><span></span></div>
      <div class="ground" id="ground"></div>
      <div class="horse pixel" id="horse" aria-label="Caballo">
        <div class="pixel-horse"></div>
      </div>
      <div class="msg hidden" id="msg"></div>
    </div>
    <div class="controls-bar">
      <button class="lobby-back-btn" id="backBtn" title="Volver">←</button>
      <button class="control-btn" id="jumpBtn">SALTAR</button>
      <button class="control-btn" id="duckBtn">AGACHAR</button>
    </div>
  </div>

  <script src="game-characters.js"></script>
  <script>
    // ── State ────────────────────────────────────────
    const DIFF_SPEEDS = { easy: 3.2, normal: 4.2, hard: 5.6 };
    const urlParams = new URLSearchParams(window.location.search);
    const initialHorseParam = urlParams.get("horse");
    const pixelThemes = window.GAME_CHARACTERS?.PIXEL_HORSE_THEMES || [];
    const legacyHorseMap = {
      "horse-caramelo": "castano",
      "horse-arcoiris": "palomino",
      "horse-deportivo": "negro",
      "horse-princesa": "blanco",
      "horse-vaquero": "alazan",
      "horse-fantasia-azul": "gris",
      "horse-fuego": "alazan",
      "horse-bosque": "pinto",
      "horse-nieve": "blanco",
      "horse-neon": "moro"
    };
    function normalizeHorseId(id) {
      const migrated = legacyHorseMap[id] || id;
      return pixelThemes.some((theme) => theme.id === migrated) ? migrated : "castano";
    }
    let selectedHorse = normalizeHorseId(initialHorseParam || localStorage.getItem("horsePixelCharacter") || "castano");
    let selectedDiff = localStorage.getItem("horsePixelDiff") || "easy";
    let best = Number(localStorage.getItem("horsePixelBest") || 0);

    function postToParent(payload) {
      try { window.parent && window.parent !== window && window.parent.postMessage(payload, window.location.origin); }
      catch (_) {}
    }

    // ── DOM refs ─────────────────────────────────────
    const lobby = document.getElementById("lobby");
    const gameWrap = document.getElementById("gameWrap");
    const game = document.getElementById("game");
    const horse = document.getElementById("horse");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const msg = document.getElementById("msg");
    const jumpBtn = document.getElementById("jumpBtn");
    const duckBtn = document.getElementById("duckBtn");
    const backBtn = document.getElementById("backBtn");
    const cloud = document.getElementById("cloud");
    const lobbyCharGrid = document.getElementById("lobbyCharGrid");
    const lobbyBest = document.getElementById("lobbyBest");

    // ── Physics ──────────────────────────────────────
    const groundBottom = 54;
    const gravity = 0.62;
    const jumpPower = 13.2;
    let running = false;
    let score = 0;
    let speed = DIFF_SPEEDS[selectedDiff];
    let horseY = 0;
    let velocityY = 0;
    let isJumping = false;
    let isDucking = false;
    let obstacles = [];
    let nextObstacleIn = 0;
    let animationId = null;
    let lastTime = 0;
    let cloudX = -80;

    // ── Init sprites ─────────────────────────────────
    window.GAME_CHARACTERS?.injectHorseSprite(document);

    function format(n) { return String(Math.floor(n)).padStart(5, "0"); }

    // ── Lobby ────────────────────────────────────────
    function initLobby() {
      lobbyBest.textContent = format(best);
      bestEl.textContent = format(best);

      const chars = pixelThemes;
      lobbyCharGrid.innerHTML = chars.map((c) => `
        <button class="char-btn ${c.id === selectedHorse ? "active" : ""}" data-char="${c.id}" title="${c.label}">
          ${window.GAME_CHARACTERS.pixelHorseSvg(4, c)}
        </button>
      `).join("");

      document.querySelectorAll(".diff-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.diff === selectedDiff);
      });
    }

    lobbyCharGrid.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-char]");
      if (!btn) return;
      selectedHorse = btn.dataset.char;
      localStorage.setItem("horsePixelCharacter", selectedHorse);
      postToParent({ type: "pixel-runner-character", characterId: selectedHorse });
      document.querySelectorAll(".char-btn").forEach((b) => b.classList.toggle("active", b.dataset.char === selectedHorse));
      applyCharacter();
    });

    document.querySelectorAll(".diff-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedDiff = btn.dataset.diff;
        localStorage.setItem("horsePixelDiff", selectedDiff);
        document.querySelectorAll(".diff-btn").forEach((b) => b.classList.toggle("active", b.dataset.diff === selectedDiff));
      });
    });

    document.getElementById("lobbyPlayBtn").addEventListener("click", () => {
      lobby.classList.add("hidden");
      gameWrap.classList.remove("hidden");
      applyCharacter();
      startGame();
    });

    backBtn.addEventListener("click", () => {
      stopGame();
      gameWrap.classList.add("hidden");
      lobby.classList.remove("hidden");
      initLobby();
    });

    // ── Character ────────────────────────────────────
    function applyCharacter() {
      const pixelHorse = horse.querySelector(".pixel-horse");
      if (pixelHorse && window.GAME_CHARACTERS) {
        const theme = pixelThemes.find((item) => item.id === selectedHorse) || pixelThemes[0];
        pixelHorse.innerHTML = window.GAME_CHARACTERS.pixelHorseSvg(6, theme).replace("<svg ", '<svg class="horse-runner-svg" ');
      }
    }

    // ── Game ─────────────────────────────────────────
    function startGame() {
      clearObstacles();
      running = true;
      score = 0;
      speed = DIFF_SPEEDS[selectedDiff];
      horseY = 0;
      velocityY = 0;
      isJumping = false;
      isDucking = false;
      nextObstacleIn = 190;
      lastTime = performance.now();
      horse.classList.remove("duck");
      msg.classList.add("hidden");
      scoreEl.textContent = format(score);
      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(loop);
    }

    function stopGame() {
      running = false;
      cancelAnimationFrame(animationId);
    }

    function endGame() {
      running = false;
      cancelAnimationFrame(animationId);
      postToParent({ type: "pixel-runner-score", score: Math.floor(score), best: Math.max(Math.floor(score), best) });
      if (score > best) {
        best = score;
        localStorage.setItem("horsePixelBest", String(best));
        bestEl.textContent = format(best);
      }
      msg.classList.remove("hidden");
      msg.innerHTML = `
        <h1>Fin del juego</h1>
        <p>Puntos: ${format(score)}<br>Récord: ${format(best)}</p>
        <button class="msg-btn" id="restartBtn">Volver a jugar</button>
        <button class="msg-btn secondary" id="toLobbyBtn">Cambiar caballo</button>
      `;
      document.getElementById("restartBtn").addEventListener("click", startGame);
      document.getElementById("toLobbyBtn").addEventListener("click", () => {
        stopGame();
        gameWrap.classList.add("hidden");
        lobby.classList.remove("hidden");
        initLobby();
      });
    }

    function loop(now) {
      if (!running) return;
      const delta = Math.min((now - lastTime) / 16.67, 2);
      lastTime = now;
      updateHorse(delta);
      updateWorld(delta);
      updateObstacles(delta);
      updateScore(delta);
      checkCollision();
      animationId = requestAnimationFrame(loop);
    }

    function updateHorse(delta) {
      if (isJumping) {
        horseY += velocityY * delta;
        velocityY -= gravity * delta;
        if (horseY <= 0) { horseY = 0; velocityY = 0; isJumping = false; }
      }
      horse.style.bottom = `calc(var(--ground-bottom) + 3px + ${horseY}px)`;
    }

    function updateWorld(delta) {
      const ground = document.getElementById("ground");
      const groundOffset = (Number(ground.dataset.offset || 0) + speed * delta) % 32;
      ground.dataset.offset = groundOffset;
      ground.style.backgroundPositionX = `-${groundOffset}px`;
      cloudX += speed * .28 * delta;
      if (cloudX > game.clientWidth + 100) cloudX = -90;
      cloud.style.right = "auto";
      cloud.style.left = `${game.clientWidth - cloudX}px`;
    }

    function updateScore(delta) {
      score += speed * .23 * delta;
      scoreEl.textContent = format(score);
    }

    function updateObstacles(delta) {
      nextObstacleIn -= speed * delta;
      if (nextObstacleIn <= 0) {
        spawnObstacle();
        const minGap = Math.max(210, 330 - speed * 8);
        const maxGap = Math.max(300, 460 - speed * 10);
        nextObstacleIn = random(minGap, maxGap);
      }
      for (const ob of obstacles) {
        ob.x -= speed * delta;
        ob.el.style.transform = `translateX(${ob.x}px)`;
      }
      obstacles = obstacles.filter((ob) => {
        if (ob.x + ob.width < -40) {
          ob.el.remove();
          speed = Math.min(speed + (ob.type === "low" ? .09 : .12), 9.5);
          return false;
        }
        return true;
      });
    }

    function spawnObstacle() {
      const gameWidth = game.clientWidth;
      const difficulty = Math.min(score / 280, 1);
      const roll = Math.random();
      let type = "small";
      if (score > 120 && roll < .20 + difficulty * .12) type = "long";
      else if (score > 70 && roll < .48) type = "medium";
      if (score > 180 && Math.random() < .22 + difficulty * .12) type = "low";
      if (type === "low") {
        const el = document.createElement("div");
        el.className = "low-obstacle";
        el.innerHTML = '<span class="rail"></span><span class="cap left"></span><span class="cap right"></span>';
        game.appendChild(el);
        obstacles.push({ el, x: gameWidth + 40, width: 86, type: "low" });
        el.style.transform = `translateX(${gameWidth + 40}px)`;
        return;
      }
      const el = document.createElement("div");
      el.className = `obstacle fence ${type}`;
      el.innerHTML = '<span class="post left"></span><span class="post right"></span><span class="bar one"></span><span class="bar two"></span><span class="bar three"></span>';
      game.appendChild(el);
      const width = type === "long" ? 96 : type === "medium" ? 68 : 48;
      obstacles.push({ el, x: gameWidth + 40, width, type });
      el.style.transform = `translateX(${gameWidth + 40}px)`;
    }

    function checkCollision() {
      const horseRect = getHorseHitbox();
      for (const ob of obstacles) {
        const r = ob.el.getBoundingClientRect();
        const g = game.getBoundingClientRect();
        const obsRect = ob.type === "low"
          ? { left: r.left - g.left + 4, right: r.right - g.left - 4, top: r.top - g.top, bottom: r.top - g.top + 18 }
          : { left: r.left - g.left + 7, right: r.right - g.left - 7, top: r.top - g.top + 6, bottom: r.bottom - g.top };
        if (rectsOverlap(horseRect, obsRect)) { endGame(); return; }
      }
    }

    function getHorseHitbox() {
      const r = horse.getBoundingClientRect();
      const g = game.getBoundingClientRect();
      const duckBonus = isDucking ? 20 : 0;
      return { left: r.left - g.left + 10, right: r.right - g.left - 12, top: r.top - g.top + 8 + duckBonus, bottom: r.bottom - g.top - 4 };
    }

    function rectsOverlap(a, b) { return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top; }

    function jump() {
      if (!running) return;
      if (!isJumping && !isDucking) { isJumping = true; velocityY = jumpPower; }
    }

    function setDuck(value) {
      if (!running || isJumping) return;
      isDucking = value;
      horse.classList.toggle("duck", value);
    }

    function clearObstacles() {
      for (const ob of obstacles) ob.el.remove();
      obstacles = [];
    }

    function random(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    // ── Controls ─────────────────────────────────────
    game.addEventListener("pointerdown", (e) => { if (e.target.closest("button")) return; jump(); });
    jumpBtn.addEventListener("pointerdown", (e) => { e.preventDefault(); jump(); });
    duckBtn.addEventListener("pointerdown", (e) => { e.preventDefault(); setDuck(true); });
    duckBtn.addEventListener("pointerup", () => setDuck(false));
    duckBtn.addEventListener("pointercancel", () => setDuck(false));
    duckBtn.addEventListener("pointerleave", () => setDuck(false));

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); jump(); }
      if (e.code === "ArrowDown") { e.preventDefault(); setDuck(true); }
    });
    document.addEventListener("keyup", (e) => {
      if (e.code === "ArrowDown") { e.preventDefault(); setDuck(false); }
    });

    // ── Start ─────────────────────────────────────────
    initLobby();
  </script>
</body>
</html>
