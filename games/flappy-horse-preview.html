<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Flappy Horse</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(160deg, #bdeeff 0%, #ecf9ff 45%, #f3ddb0 100%);
        min-height: 100dvh;
        overflow: hidden;
        touch-action: none;
        user-select: none;
      }

      /* ── LOBBY ───────────────────────────────────── */
      #lobby {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        background: linear-gradient(160deg, #bdeeff 0%, #ecf9ff 45%, #f3ddb0 100%);
        padding: 24px 16px 32px;
        overflow-y: auto;
      }

      #lobby.hidden { display: none; }

      .lobby-title {
        text-align: center;
        margin-bottom: 28px;
      }

      .lobby-title .eyebrow {
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #6a7d72;
        margin-bottom: 6px;
      }

      .lobby-title h1 {
        font-size: clamp(2rem, 8vw, 3.2rem);
        line-height: 1;
        color: #173126;
      }

      .record-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        padding: 8px 16px;
        border-radius: 999px;
        background: rgba(40, 114, 87, 0.12);
        border: 1px solid rgba(40, 114, 87, 0.2);
        color: #287257;
        font-weight: 800;
        font-size: 0.92rem;
      }

      /* horse picker */
      .section-label {
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6a7d72;
        margin-bottom: 12px;
        text-align: center;
      }

      .horse-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin-bottom: 28px;
        max-width: 360px;
      }

      .horse-option {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        padding: 10px 14px;
        border-radius: 18px;
        border: 2px solid transparent;
        background: rgba(255,255,255,0.55);
        transition: all 0.18s;
        min-width: 80px;
      }

      .horse-option:hover {
        background: rgba(255,255,255,0.8);
        transform: translateY(-2px);
      }

      .horse-option.selected {
        border-color: #287257;
        background: rgba(40,114,87,0.1);
        box-shadow: 0 0 0 3px rgba(40,114,87,0.18);
      }

      .horse-preview {
        width: 80px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .horse-preview canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        width: 80px;
        height: 60px;
      }

      .horse-option-name {
        font-size: 0.75rem;
        font-weight: 700;
        color: #3a5248;
        text-align: center;
      }

      /* play button */
      .play-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: min(300px, 100%);
        height: 58px;
        border-radius: 18px;
        border: none;
        font: inherit;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
        background: linear-gradient(135deg, #287257, #3ba97d);
        color: white;
        box-shadow: 0 8px 24px rgba(40,114,87,0.35);
        transition: transform 0.15s, box-shadow 0.15s;
        touch-action: manipulation;
      }

      .play-btn:active {
        transform: scale(0.97);
        box-shadow: 0 4px 12px rgba(40,114,87,0.3);
      }

      /* ── GAME WRAP ──────────────────────────────── */
      #gameWrap {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        flex-direction: column;
        background: #000;
      }

      #gameWrap.hidden { display: none; }

      #gameCanvas {
        flex: 1;
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }

      .controls-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: rgba(0,0,0,0.65);
        gap: 10px;
        flex-shrink: 0;
      }

      .back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 14px;
        height: 44px;
        border-radius: 14px;
        border: none;
        background: rgba(255,255,255,0.14);
        color: rgba(255,255,255,0.9);
        font: inherit;
        font-size: 0.85rem;
        font-weight: 700;
        cursor: pointer;
        touch-action: manipulation;
      }

      .jump-btn {
        flex: 1;
        height: 52px;
        border-radius: 16px;
        border: none;
        background: rgba(40,200,120,0.22);
        border: 1px solid rgba(40,200,120,0.4);
        color: rgba(255,255,255,0.95);
        font: inherit;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        touch-action: manipulation;
        letter-spacing: 0.04em;
      }

      .jump-btn:active {
        background: rgba(40,200,120,0.4);
      }

      /* in-game overlay */
      #gameOverlay {
        position: absolute;
        inset: 0;
        bottom: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
        z-index: 10;
      }

      #gameOverlay.hidden { display: none; }

      .overlay-card {
        width: min(360px, calc(100% - 32px));
        padding: 28px 24px;
        text-align: center;
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.45);
        background: rgba(255,255,255,0.78);
        box-shadow: 0 18px 50px rgba(18, 43, 31, 0.18);
        backdrop-filter: blur(18px);
        pointer-events: all;
      }

      .overlay-card h2 {
        font-size: clamp(1.4rem, 4vw, 2rem);
        color: #173126;
        margin-bottom: 8px;
      }

      .overlay-card p {
        color: #617468;
        line-height: 1.5;
        margin-bottom: 0;
      }

      .hint-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 16px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(40, 114, 87, 0.12);
        color: #287257;
        font-weight: 800;
        font-size: 0.9rem;
      }

      .countdown-num {
        font-size: clamp(5rem, 18vw, 9rem);
        font-weight: 900;
        line-height: 1;
        color: #173126;
      }

      .gameover-score {
        font-size: 2.4rem;
        font-weight: 900;
        color: #287257;
        margin: 4px 0 12px;
      }

      .gameover-record {
        font-size: 0.88rem;
        color: #6a7d72;
        font-weight: 700;
        margin-bottom: 20px;
      }

      .gameover-btns {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .btn-retry {
        height: 50px;
        border-radius: 16px;
        border: none;
        background: linear-gradient(135deg, #287257, #3ba97d);
        color: white;
        font: inherit;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        touch-action: manipulation;
      }

      .btn-lobby {
        height: 44px;
        border-radius: 16px;
        border: 1px solid rgba(27,58,44,0.2);
        background: rgba(255,255,255,0.6);
        color: #3a5248;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>

    <!-- ── LOBBY ───────────────────────────────────────── -->
    <div id="lobby">
      <div class="lobby-title">
        <div class="eyebrow">Minijuego</div>
        <h1>🐴 Flappy Horse</h1>
        <div class="record-badge">🏆 Récord: <span id="lobbyRecord">0</span></div>
      </div>

      <p class="section-label">Elige tu caballo</p>
      <div class="horse-grid" id="horseGrid"></div>

      <button class="play-btn" id="playBtn" type="button">
        ▶ &nbsp;¡Jugar!
      </button>
    </div>

    <!-- ── GAME WRAP ──────────────────────────────────── -->
    <div id="gameWrap" class="hidden">
      <div id="gameOverlay">
        <div class="overlay-card" id="overlayCard"></div>
      </div>
      <canvas id="gameCanvas"></canvas>
      <div class="controls-bar">
        <button class="back-btn" id="backBtn" type="button">← Lobby</button>
        <button class="jump-btn" id="jumpBtn" type="button">🐴 SALTAR</button>
      </div>
    </div>

    <script src="game-characters.js"></script>
  <script>
    (() => {
      /* ── CONSTANTS ─────────────────────────────────── */
      const BEST_KEY = "hipica.flappyHorse.best";
      const COLOR_KEY = "hipica.flappyHorse.color";
      const GC = window.GAME_CHARACTERS;
      const horseThemes = GC?.PIXEL_HORSE_THEMES || [];

      /* ── STATE ─────────────────────────────────────── */
      const urlParams = new URLSearchParams(window.location.search);
      const initialHorse = urlParams.get("horse");
      let bestScore = Number(localStorage.getItem(BEST_KEY) || 0);
      let selectedTheme = horseThemes.find(t => t.id === initialHorse)
        || horseThemes.find(t => t.id === localStorage.getItem(COLOR_KEY))
        || horseThemes[0];

      function postToParent(payload) {
        try { window.parent && window.parent !== window && window.parent.postMessage(payload, window.location.origin); }
        catch (_) {}
      }

      const gameState = {
        running: false,
        gameOver: false,
        countdown: 0,
        countdownTimer: null,
        score: 0,
        gravity: 0.27,
        flap: -6.6,
        groundHeight: 82,
        baseSpeed: 2.15,
        speed: 2.15,
        spawnTimer: 0,
        spawnEvery: 132,
        currentGap: 248,
        frame: 0,
        horse: { x: 0, y: 0, width: 74, height: 46, velocity: 0, bob: 0 },
        fences: []
      };

      /* ── DOM ───────────────────────────────────────── */
      const lobby      = document.getElementById("lobby");
      const gameWrap   = document.getElementById("gameWrap");
      const canvas     = document.getElementById("gameCanvas");
      const ctx        = canvas.getContext("2d");
      const gameOverlay = document.getElementById("gameOverlay");
      const overlayCard = document.getElementById("overlayCard");
      const lobbyRecord = document.getElementById("lobbyRecord");
      const horseGrid  = document.getElementById("horseGrid");
      const playBtn    = document.getElementById("playBtn");
      const backBtn    = document.getElementById("backBtn");
      const jumpBtn    = document.getElementById("jumpBtn");

      /* ── LOBBY ─────────────────────────────────────── */
      function renderLobby() {
        lobbyRecord.textContent = bestScore;
        horseGrid.innerHTML = horseThemes.map(t => `
          <div class="horse-option ${t.id === selectedTheme.id ? 'selected' : ''}"
               data-theme="${t.id}" role="button" tabindex="0">
            <canvas class="horse-preview" width="52" height="52" data-preview="${t.id}"></canvas>
            <span class="horse-option-name">${t.label}</span>
          </div>
        `).join("");

        horseThemes.forEach(t => {
          const cvs = horseGrid.querySelector(`[data-preview="${t.id}"]`);
          drawPreviewHorse(cvs, t);
        });
      }

      function drawPreviewHorse(cvs, theme) {
        cvs.width = 80; cvs.height = 60;
        const c = cvs.getContext("2d");
        c.clearRect(0, 0, 80, 60);
        GC.drawPixelHorse(c, 0, 0, 5, theme);
      }

      horseGrid.addEventListener("click", e => {
        const opt = e.target.closest("[data-theme]");
        if (!opt) return;
        selectedTheme = horseThemes.find(t => t.id === opt.dataset.theme);
        localStorage.setItem(COLOR_KEY, selectedTheme.id);
        postToParent({ type: "flappy-horse-character", characterId: selectedTheme.id });
        renderLobby();
      });

      playBtn.addEventListener("click", () => {
        lobby.classList.add("hidden");
        gameWrap.classList.remove("hidden");
        resizeCanvas();
        startCountdown();
      });

      backBtn.addEventListener("click", goToLobby);

      function goToLobby() {
        stopGame();
        gameWrap.classList.add("hidden");
        lobby.classList.remove("hidden");
        renderLobby();
      }

      /* ── CANVAS RESIZE ─────────────────────────────── */
      function resizeCanvas() {
        const bar = gameWrap.querySelector(".controls-bar");
        const barH = bar ? bar.offsetHeight : 70;
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight - barH;
        gameState.horse.x = Math.round(canvas.width * 0.22);
        if (!gameState.running && !gameState.gameOver) {
          gameState.horse.y = Math.round(canvas.height * 0.45);
        }
      }

      window.addEventListener("resize", () => {
        resizeCanvas();
      });

      /* ── GAME CONTROL ──────────────────────────────── */
      function stopGame() {
        gameState.running = false;
        gameState.gameOver = false;
        if (gameState.countdownTimer) {
          clearInterval(gameState.countdownTimer);
          gameState.countdownTimer = null;
        }
        gameState.countdown = 0;
      }

      function resetGameState(startRunning) {
        stopGame();
        gameState.running  = startRunning;
        gameState.score    = 0;
        gameState.speed    = gameState.baseSpeed;
        gameState.spawnTimer = 0;
        gameState.currentGap = 248;
        gameState.frame    = 0;
        gameState.fences   = [];
        gameState.horse.y  = Math.round(canvas.height * 0.45);
        gameState.horse.velocity = 0;
        gameState.horse.bob = 0;
        gameState.gravity  = 0.27;
      }

      function startCountdown() {
        resetGameState(false);
        gameState.countdown = 3;
        showCountdown(3);

        gameState.countdownTimer = setInterval(() => {
          gameState.countdown -= 1;
          if (gameState.countdown > 0) {
            showCountdown(gameState.countdown);
          } else {
            clearInterval(gameState.countdownTimer);
            gameState.countdownTimer = null;
            gameState.countdown = 0;
            gameState.running = true;
            hideOverlay();
          }
        }, 1000);
      }

      function flapHorse() {
        if (gameState.countdown > 0) return;
        if (gameState.gameOver) return;
        if (!gameState.running) return;
        gameState.horse.velocity = gameState.flap;
      }

      function endGame() {
        gameState.running = false;
        gameState.gameOver = true;
        if (gameState.score > bestScore) {
          bestScore = gameState.score;
          localStorage.setItem(BEST_KEY, String(bestScore));
        }
        postToParent({ type: "flappy-horse-score", score: gameState.score, best: bestScore });
        showGameOver();
      }

      /* ── OVERLAY HELPERS ───────────────────────────── */
      function hideOverlay() {
        gameOverlay.classList.add("hidden");
        overlayCard.innerHTML = "";
      }

      function showCountdown(n) {
        gameOverlay.classList.remove("hidden");
        overlayCard.innerHTML = `<div class="countdown-num">${n}</div>`;
      }

      function showStartScreen() {
        gameOverlay.classList.remove("hidden");
        overlayCard.innerHTML = `
          <h2>¡Listo!</h2>
          <p>Salta para no tocar las vallas ni el suelo.</p>
          <div class="hint-pill">Espacio · clic · toque</div>
        `;
      }

      function showGameOver() {
        const isNew = gameState.score >= bestScore;
        gameOverlay.classList.remove("hidden");
        overlayCard.innerHTML = `
          <h2>¡Has chocado!</h2>
          <div class="gameover-score">${gameState.score}</div>
          <div class="gameover-record">${isNew ? "🏆 ¡Nuevo récord!" : `Récord: ${bestScore}`}</div>
          <div class="gameover-btns">
            <button class="btn-retry" id="retryBtn">🔄 Volver a jugar</button>
            <button class="btn-lobby" id="toLobbyBtn">← Cambiar caballo</button>
          </div>
        `;
        document.getElementById("retryBtn").addEventListener("click", startCountdown);
        document.getElementById("toLobbyBtn").addEventListener("click", goToLobby);
      }

      /* ── INPUT ─────────────────────────────────────── */
      canvas.addEventListener("pointerdown", e => {
        e.preventDefault();
        flapHorse();
      });

      jumpBtn.addEventListener("pointerdown", e => {
        e.preventDefault();
        flapHorse();
      });

      window.addEventListener("keydown", e => {
        if (e.code === "Space" || e.code === "ArrowUp") {
          e.preventDefault();
          flapHorse();
        }
      });

      /* ── UPDATE ────────────────────────────────────── */
      function update() {
        gameState.frame += 1;
        gameState.horse.bob += 0.08;

        if (!gameState.running || gameState.gameOver) return;

        const lvl = Math.floor(gameState.score / 25);
        gameState.speed    = gameState.baseSpeed * Math.pow(1.01, lvl);
        gameState.gravity  = 0.27 * Math.pow(1.01, lvl);
        gameState.currentGap = Math.max(132, 248 - lvl * 6);

        gameState.spawnTimer += 1;
        if (gameState.spawnTimer >= gameState.spawnEvery) {
          gameState.spawnTimer = 0;
          spawnFence();
        }

        gameState.horse.velocity += gameState.gravity;
        gameState.horse.y += gameState.horse.velocity;

        gameState.fences.forEach(f => {
          f.x -= gameState.speed;
          if (!f.scored && f.x + f.width < gameState.horse.x) {
            f.scored = true;
            gameState.score += 1;
          }
        });
        gameState.fences = gameState.fences.filter(f => f.x + f.width > -140);

        const hb = {
          x: gameState.horse.x - gameState.horse.width  * 0.34,
          y: gameState.horse.y - gameState.horse.height * 0.35,
          width:  gameState.horse.width  * 0.72,
          height: gameState.horse.height * 0.7
        };

        const hitGround = gameState.horse.y + gameState.horse.height / 2 >= canvas.height - gameState.groundHeight;
        const hitSky    = gameState.horse.y - gameState.horse.height / 2 <= 0;
        const hitFence  = gameState.fences.some(f => {
          const top = { x: f.x, y: 0, width: f.width, height: f.gapY };
          const bot = { x: f.x, y: f.gapY + f.gapHeight, width: f.width,
                        height: canvas.height - gameState.groundHeight - (f.gapY + f.gapHeight) };
          return intersects(hb, top) || intersects(hb, bot);
        });

        if (hitGround || hitSky || hitFence) endGame();
      }

      function spawnFence() {
        const gap    = gameState.currentGap;
        const minTop = 62;
        const maxTop = canvas.height - gameState.groundHeight - gap - 62;
        const topH   = minTop + Math.random() * (maxTop - minTop);
        gameState.fences.push({
          x: canvas.width + 40,
          width: 92,
          gapY: topH,
          gapHeight: gap,
          scored: false,
          colorA: Math.random() > 0.5 ? "#f3c969" : "#f2a94c",
          colorB: Math.random() > 0.5 ? "#2f8f6b" : "#367dc0"
        });
      }

      function intersects(a, b) {
        return a.x < b.x + b.width && a.x + a.width > b.x &&
               a.y < b.y + b.height && a.y + a.height > b.y;
      }

      /* ── DRAW ──────────────────────────────────────── */
      function drawBackground() {
        const W = canvas.width, H = canvas.height;
        const sky = ctx.createLinearGradient(0, 0, 0, H);
        sky.addColorStop(0,    "#bdeeff");
        sky.addColorStop(0.68, "#ecf9ff");
        sky.addColorStop(0.68, "#f3ddb0");
        sky.addColorStop(1,    "#d2b57b");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, H);

        [[W*0.1, 80, 1.1],[W*0.35, 110, 0.9],[W*0.65, 75, 1.25],[W*0.88, 130, 0.95]].forEach(([x,y,s]) => drawCloud(x,y,s));

        ctx.fillStyle = "#7fb96d";
        ctx.beginPath();
        ctx.moveTo(0, H - gameState.groundHeight - 24);
        for (let x = 0; x <= W; x += 42) {
          ctx.lineTo(x, H - gameState.groundHeight - 18 - Math.sin((x + gameState.frame * 2) * 0.01) * 8);
        }
        ctx.lineTo(W, H - gameState.groundHeight + 18);
        ctx.lineTo(0,  H - gameState.groundHeight + 18);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#9a7b4e";
        ctx.fillRect(0, H - gameState.groundHeight, W, gameState.groundHeight);
        ctx.fillStyle = "#b8925d";
        for (let i = 0; i < W; i += 28) {
          ctx.fillRect(i + (gameState.frame * 2 % 28), H - gameState.groundHeight + 8, 12, 8);
        }

        if (gameState.running) {
          ctx.fillStyle = "rgba(255,255,255,0.9)";
          ctx.font = "bold 28px Inter, system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(String(gameState.score), canvas.width / 2, 48);
        }
      }

      function drawCloud(x, y, s) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(s, s);
        ctx.fillStyle = "rgba(255,255,255,0.78)";
        ctx.beginPath();
        ctx.arc(0, 0, 20, 0, Math.PI * 2);
        ctx.arc(24, -10, 26, 0, Math.PI * 2);
        ctx.arc(56, 0, 20, 0, Math.PI * 2);
        ctx.arc(28, 10, 26, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawFence(f) {
        const botStart = f.gapY + f.gapHeight;
        drawFenceSection(f.x, 0, f.width, f.gapY, f);
        drawFenceSection(f.x, botStart, f.width, canvas.height - gameState.groundHeight - botStart, f);
      }

      function drawFenceSection(x, y, width, height, f) {
        const pw = 12;
        ctx.fillStyle = "#6b4f2f";
        ctx.fillRect(x, y, pw, height);
        ctx.fillRect(x + width - pw, y, pw, height);
        const rails = Math.max(2, Math.floor(height / 70));
        for (let i = 0; i < rails; i++) {
          const ry = y + 18 + i * ((height - 36) / Math.max(1, rails - 1));
          const sw = (width - pw * 2) / 6;
          for (let j = 0; j < 6; j++) {
            ctx.fillStyle = [f.colorA, "#ffffff", f.colorB][j % 3];
            ctx.fillRect(x + pw + j * sw, ry, sw + 1, 16);
          }
          ctx.strokeStyle = "rgba(58,44,26,0.22)";
          ctx.lineWidth = 1;
          ctx.strokeRect(x + pw, ry, width - pw * 2, 16);
        }
      }

      function drawHorse() {
        const { x, y, velocity, bob } = gameState.horse;
        const angle = Math.max(-0.55, Math.min(0.65, velocity * 0.045));
        ctx.save();
        ctx.translate(x, y + Math.sin(bob) * 4);
        ctx.rotate(angle);
        ctx.translate(-48, -36);
        GC.drawPixelHorse(ctx, 0, 0, 6, selectedTheme);
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        gameState.fences.forEach(drawFence);
        drawHorse();
      }

      /* ── LOOP ──────────────────────────────────────── */
      function loop() {
        update();
        if (!gameWrap.classList.contains("hidden")) draw();
        requestAnimationFrame(loop);
      }

      /* ── INIT ──────────────────────────────────────── */
      renderLobby();
      loop();
    })();
    </script>
  </body>
</html>
